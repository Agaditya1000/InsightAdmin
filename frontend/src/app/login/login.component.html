<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="max-w-md w-full bg-white p-8 rounded shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Insight Admin Login</h2>
    <div *ngIf="error" class="bg-red-100 text-red-700 p-2 mb-4 rounded">{{ error }}</div>
    
    <div class="mb-4">
      <label class="block text-gray-700 mb-2">Email</label>
      <input type="email" [(ngModel)]="email" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="admin@example.com">
    </div>
    <div class="mb-6">
      <label class="block text-gray-700 mb-2">Password</label>
      <input type="password" [(ngModel)]="password" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="********">
    </div>
    
    <button (click)="login()" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 focus:outline-none mb-6 shadow-sm">
      Sign In
    </button>
    
    <div class="text-center text-sm text-gray-600">
      Don't have an account? <a routerLink="/signup" class="text-blue-600 font-semibold hover:underline">Create user account</a>
    </div>
  </div>
</div>
