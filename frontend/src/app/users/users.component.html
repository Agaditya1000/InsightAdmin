<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
  <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
    <div>
      <h3 class="text-xl font-bold text-gray-800 tracking-tight">User Management</h3>
      <p class="text-sm text-gray-500 mt-1 font-medium">Manage system accounts and access control status</p>
    </div>
    <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg text-sm font-bold transition-all duration-200 shadow-sm hover:shadow-md focus:ring-2 focus:ring-blue-500 focus:ring-offset-1 outline-none flex items-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
      Add User
    </button>
  </div>
  
  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="bg-gray-50 text-gray-500 text-xs tracking-wider border-b border-gray-100 uppercase font-bold">
          <th class="py-4 px-6">Name</th>
          <th class="py-4 px-6">Email</th>
          <th class="py-4 px-6">Role</th>
          <th class="py-4 px-6">Status</th>
          <th class="py-4 px-6 text-right">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-50">
        <tr *ngIf="loading">
          <td colspan="5" class="py-12 text-center text-gray-400">
             <svg class="animate-spin h-6 w-6 mx-auto mb-2 text-blue-500" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
             Loading Users...
          </td>
        </tr>
        <tr *ngFor="let user of paginatedUsers" class="hover:bg-gray-50/50 transition-colors">
          <td class="py-4 px-6 font-bold text-gray-800">{{ user.name }}</td>
          <td class="py-4 px-6 text-gray-600">{{ user.email }}</td>
          <td class="py-4 px-6">
            <select [ngModel]="user.role" (ngModelChange)="changeRole(user, $event)" 
                    class="bg-gray-50 border border-gray-200 rounded px-2 py-1 text-xs font-bold outline-none focus:ring-1 focus:ring-blue-500">
              <option value="admin">Admin</option>
              <option value="user">User</option>
            </select>
          </td>
          <td class="py-4 px-6">
            <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold shadow-sm"
                  [ngClass]="user.isActive ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'">
              {{ user.isActive ? 'Active' : 'Inactive' }}
            </span>
          </td>
          <td class="py-4 px-6 text-right space-x-2">
            <button (click)="toggleActive(user)" [ngClass]="user.isActive ? 'text-red-500 hover:text-red-700' : 'text-green-500 hover:text-green-700'" class="text-xs font-bold outline-none">
              {{ user.isActive ? 'Disable' : 'Enable' }}
            </button>
            <button (click)="deleteUser(user._id)" class="text-xs font-bold text-gray-400 hover:text-red-600 outline-none">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  
  <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-between items-center">
    <span class="text-sm text-gray-500 font-medium">Showing {{ paginatedUsers.length }} of {{ totalUsers }} users</span>
    <div class="flex space-x-2">
      <button [disabled]="currentPage === 1" (click)="currentPage = currentPage - 1" class="px-3 py-1 border rounded bg-white text-xs font-bold disabled:opacity-50 outline-none">Prev</button>
      <button [disabled]="currentPage * pageSize >= totalUsers" (click)="currentPage = currentPage + 1" class="px-3 py-1 border rounded bg-white text-xs font-bold disabled:opacity-50 outline-none">Next</button>
    </div>
  </div>
</div>
