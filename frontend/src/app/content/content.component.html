<div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden mb-6">
  <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
    <div>
      <h3 class="text-xl font-bold text-gray-800 tracking-tight">Content Management</h3>
      <p class="text-sm text-gray-500 mt-1 font-medium">Create and manage systemic notifications and posts.</p>
    </div>
    <button (click)="isAdding = !isAdding" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2.5 rounded-lg text-sm font-bold transition-all duration-200 shadow-sm outline-none flex items-center">
      <svg *ngIf="!isAdding" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
      {{ isAdding ? 'Cancel' : 'New Content' }}
    </button>
  </div>
  
  <div *ngIf="isAdding" class="p-6 bg-blue-50/30 border-b border-blue-100">
    <div class="mb-4">
      <label class="block text-gray-700 font-semibold mb-2">Title</label>
      <input type="text" [(ngModel)]="newTitle" class="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Announcement Title">
    </div>
    <div class="mb-4">
      <label class="block text-gray-700 font-semibold mb-2">Content Body</label>
      <textarea [(ngModel)]="newBody" class="w-full border border-gray-300 rounded p-2 focus:ring-2 focus:ring-blue-500 outline-none h-24" placeholder="Write something..."></textarea>
    </div>
    <button (click)="addContent()" class="bg-green-600 text-white px-6 py-2 rounded shadow hover:bg-green-700 font-bold">Publish Post</button>
  </div>
  
  <div class="p-6">
    <div *ngIf="loading" class="text-center text-gray-500 py-8">Loading content...</div>
    <div *ngIf="!loading && contents.length === 0" class="text-center text-gray-500 py-8">No content available.</div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div *ngFor="let item of contents" class="border border-gray-200 rounded-lg p-5 hover:shadow-md transition-shadow relative bg-white">
        <h4 class="font-bold text-lg text-gray-800 mb-2">{{ item.title }}</h4>
        <p class="text-gray-600 text-sm mb-4">{{ item.body }}</p>
        <div class="flex justify-between items-center text-xs text-gray-400 border-t pt-4 mt-2">
          <span>By: {{ item.author }}</span>
          <span>{{ item.createdAt | date:'shortTime' }} on {{ item.createdAt | date:'shortDate' }}</span>
        </div>
        <button (click)="deleteContent(item._id)" class="absolute top-4 right-4 text-red-400 hover:text-red-600 outline-none">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" /></svg>
        </button>
      </div>
    </div>
  </div>
</div>
