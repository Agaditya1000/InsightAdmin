<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="max-w-md w-full bg-white p-8 rounded shadow-md border border-gray-100">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Create an Account</h2>
    <div *ngIf="error" class="bg-red-100 text-red-700 p-2 mb-4 rounded font-medium text-sm">{{ error }}</div>
    
    <div class="mb-4">
      <label class="block text-gray-700 mb-2 font-semibold text-sm">Full Name</label>
      <input type="text" [(ngModel)]="name" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="John Doe">
    </div>
    <div class="mb-4">
      <label class="block text-gray-700 mb-2 font-semibold text-sm">Email Address</label>
      <input type="email" [(ngModel)]="email" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="user@example.com">
    </div>
    <div class="mb-6">
      <label class="block text-gray-700 mb-2 font-semibold text-sm">Password</label>
      <input type="password" [(ngModel)]="password" class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="********">
    </div>
    
    <button (click)="signup()" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700 focus:outline-none transition mb-6 shadow-sm">
      Register
    </button>
    
    <div class="text-center text-sm text-gray-600">
      Already have an account? <a routerLink="/login" class="text-blue-600 font-semibold hover:underline">Sign In</a>
    </div>
  </div>
</div>
