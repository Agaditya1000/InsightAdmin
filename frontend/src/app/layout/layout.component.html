<div class="flex h-screen bg-gray-50">
  <!-- Sidebar -->
  <aside class="w-64 bg-gray-900 text-white flex flex-col shadow-xl">
    <div class="h-16 flex items-center justify-center font-bold text-xl border-b border-gray-800 tracking-wide">
      Insight<span class="ml-1" [ngClass]="authService.isAdmin ? 'text-blue-500' : 'text-green-500'">{{ authService.isAdmin ? 'Admin' : 'User' }}</span>
    </div>
    <nav class="flex-1 p-4 space-y-2 font-medium">
      <a routerLink="/dashboard" routerLinkActive="bg-gray-800 border-l-4 border-blue-500" class="block py-3 px-4 rounded transition-all duration-200 hover:bg-gray-800 hover:translate-x-1 outline-none">Dashboard</a>
      <a routerLink="/profile" routerLinkActive="bg-gray-800 border-l-4 border-blue-500" class="block py-3 px-4 rounded transition-all duration-200 hover:bg-gray-800 hover:translate-x-1 outline-none">My Profile</a>
      <a routerLink="/content" routerLinkActive="bg-gray-800 border-l-4 border-blue-500" class="block py-3 px-4 rounded transition-all duration-200 hover:bg-gray-800 hover:translate-x-1 outline-none">Announcements</a>
      <a *ngIf="authService.isAdmin" routerLink="/users" routerLinkActive="bg-gray-800 border-l-4 border-blue-500" class="block py-3 px-4 rounded transition-all duration-200 hover:bg-gray-800 hover:translate-x-1 outline-none">User Management</a>
    </nav>
    <div class="p-4">
      <button (click)="logout()" class="w-full bg-red-600/90 hover:bg-red-600 font-bold py-2.5 px-4 rounded shadow-md transition-all duration-200 outline-none hover:shadow-lg focus:ring-2 focus:ring-red-400">
        Logout
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <!-- Top Nav -->
    <header class="h-16 bg-white shadow-sm flex items-center px-8 justify-between z-10">
      <h2 class="text-xl font-bold text-gray-800 tracking-tight">{{ authService.isAdmin ? 'Admin Control Panel' : 'User Portal' }}</h2>
      <div class="flex items-center space-x-4">
        <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold shadow-sm border border-blue-200">
          {{ authService.isAdmin ? 'A' : 'U' }}
        </div>
        <div class="text-gray-600 font-medium text-sm hidden sm:block">Logged in as: <span class="text-gray-800">{{ authService.isAdmin ? 'Administrator' : 'User' }}</span></div>
      </div>
    </header>
    
    <!-- Page Content -->
    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
